#####################################################################
# Smart Bed Fan Control System
#####################################################################
#  DISCLAIMER #
#  Script inspired by Ellis benfans.cfg and 3DPRintDemon's Bbed fans monitor.
#    - https://github.com/VoronDesign/VoronUsers/tree/8e5067f4f6457da8a552983dd210ec48c40be2ca/printer_mods/Ellis/Bed_Fans/Klipper_Macros
#      - https://github.com/3DPrintDemon/Demon_Klipper_Essentials_Unified
#    - Development supported by Gemini in addition to my functional testing and code verification.
#
#
# FEATURES #
#  Design philopshy prioritizes a turn key, autonomous chamber tempurature management tool.
#    - Includes heating logic, bed and chamber tempurature response logic, safety and error protection, and bed/chamber cooldown logic.
#  
#  Heat-Up Efficiency and "Not Heating at Expected Rate" Protection
#    - Fans stay OFF during M190 to prioritize bed heating.
#    - Gradually ramps up fan speeds to prevent bed temperature drops.
#    - Throttles fans if bed temp drops >2°C below target.
#
#  Dynamic Chamber Temperature Management
#    - Dynamically adjusts fan speeds with damping thresholds to maintain chamber temperature target.
#
#  Preventative Print Warping via Chamber Cool Down Management
#    - Initiates 100% bed fan speeds, then slows when defined bed / chamber delta is met.
#    - Defined value allows for slower cooling, but safer for ABS / faster cooling, but more risk.
#    - Auto-Shutdown once the bed reaches defined cooling threshold.
#
#####################################################################

[gcode_macro _BEDFANVARS]
variable_fan:                    "Bed_Fans"     # Fan name in printer.cfg.
variable_chamber_sensor:         "Chamber_Temp" # Temperature sensor in printer.cfg.
variable_heating_threshold:      90             # Minimum bed temperature target to enable bed fans (IE: Not used for PLA).
variable_slow:                   0.25           # Minimum fan speed. Default 0.25 (25%) for non-PWM fans to prevent stalling.
variable_fast:                   1.0            # Max fan speed (1 = 100%).
variable_cooling_threshold:      40             # Bed temperature target during cooldown to auto-shutdown.
variable_cooling_delta:          10             # Switch to 'slow' once the temp gap between bed and chamber is less than this. Higher = slower cooling (safer for ABS). Lower = faster cooling (more risk).
variable_ramp_increment:         0.05           # Fan speed step percentage (0.05 = 5%) during adjustments.
variable_chamber_target_test:    60             # Used only for this script's functional testing (TEST_FAN_RAMP). Chamber temperature target.
variable_chamber_target:         0              # DO NOT MODIFY. PLACEHOLDER VALUE WILL BE OVERWRITTEN BY SLICER.


gcode:

[gcode_macro BEDFANSSLOW]
gcode:
    {% set slow = printer["gcode_macro _BEDFANVARS"].slow|float %}
    {% set fan = printer["gcode_macro _BEDFANVARS"].fan %}
    SET_FAN_SPEED FAN={fan} SPEED={slow}

[gcode_macro BEDFANSFAST]
gcode:
    {% set fast = printer["gcode_macro _BEDFANVARS"].fast|float %}
    {% set fan = printer["gcode_macro _BEDFANVARS"].fan %}
    SET_FAN_SPEED FAN={fan} SPEED={fast}

[gcode_macro BEDFANSOFF]
gcode:
    {% set fan = printer["gcode_macro _BEDFANVARS"].fan %}
    SET_FAN_SPEED FAN={fan} SPEED=0

#####################################################################
# POWER RAMP LOGIC
#####################################################################
[gcode_macro POWER_RAMP]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set fan = vars.fan %}
    {% set fast = vars.fast|float %}
    {% set slow = vars.slow|float %} # We need this to know the starting floor
    
    # Read the ACTUAL speed from the hardware
    {% set current_speed = printer["fan_generic " ~ fan].speed|float %}
    
    {% if current_speed < fast %}
        # If the fan is currently OFF or below 'Slow', kick it to 'Slow' first
        {% if current_speed < slow %}
            {% set next_val = slow %}
        {% else %}
            # Otherwise, take a normal ramp step
            {% set next_val = [current_speed + vars.ramp_increment, fast]|min %}
        {% endif %}
        SET_FAN_SPEED FAN={fan} SPEED={next_val}
        M118 Bed Fans Ramping: { (next_val * 100)|int }%
    {% endif %}

[gcode_macro POWER_BLEED]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set fan = vars.fan %}
    {% set slow = vars.slow|float %}
    
    # Get actual current speed from the hardware
    {% set current_speed = printer["fan_generic " ~ fan].speed|float %}
    
    {% if current_speed > slow %}
        # Take one step down, but don't go below the 'slow' floor
        {% set next_val = [current_speed - vars.ramp_increment, slow]|max %}
        
        SET_FAN_SPEED FAN={fan} SPEED={next_val}
        M118 Chamber Stabilization: Bleeding fans to { (next_val * 100)|int }%
    {% endif %}

#####################################################################
# HEATER OVERRIDES
#####################################################################
# Standard heater command override to ensure fans don't trigger prematurely
[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set heater = params.HEATER|default("None") %}
    {% set target = params.TARGET|default(0.0)|float %}

    {% if heater|lower == "heater_bed" %}
        # Only update the target temperature; fan activation is handled by M190
        _SET_HEATER_TEMPERATURE HEATER={heater} TARGET={target}
    {% else %}
        _SET_HEATER_TEMPERATURE {rawparams}
    {% endif %}

# M140: Set Bed Temperature
[gcode_macro M140]
rename_existing: M99140
gcode:
    {% set s = params.S|float %}
    # Updates heater target without initiating fan monitoring loops
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={s}

# M190: Set Bed Temperature and Wait
[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|float %}
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}

    # Initialize fans and monitoring loop BEFORE the blocking wait
    # Ensures the loop is a background process before TEMPERATURE_WAIT can block the thread.
    # Conditional check: Initialize fans and monitoring loop only if above threshold
    {% if s >= vars.heating_threshold %}
        M118 Initializing thermal management loop in background...
        BEDFANSSLOW                            
        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=1
    {% else %}
        # Ensure fans are disabled for low-temp materials (e.g. PLA)
        BEDFANSOFF                           
        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    {% endif %}

    # Now perform the blocking bed wait.
    M99190 S{s}

    # Post-heat confirmation
    {% if s >= vars.heating_threshold %}
        M118 Bed Target Reached. Transitioning to chamber management. [cite: 32]
    {% endif %}

#####################################################################
# MONITORING & THERMAL MANAGEMENT
#####################################################################

[delayed_gcode bedfanheatloop]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set bed_target = printer.heater_bed.target|float %}
    {% set bed_temp = printer.heater_bed.temperature|float %}
    {% set sensor = vars.chamber_sensor %}
    {% set current_chamber = printer["temperature_sensor " + sensor].temperature|float %}
    {% set target_chamber = vars.chamber_target|float %}

    {% if bed_target >= vars.heating_threshold %}
        # MANAGE BED HEATING AND RECOVERY FROM HEAT LOSS(Stay at slow speed until bed reaches near target)
        # Prevents "Not heating at expected rate" errors during the initial ramp.
        {% if bed_temp < (bed_target - 2.0) %}
            # Only notify if fans were actually above the slow floor
            {% if printer["fan_generic " + vars.fan].speed|float > vars.slow|float %}
                M118 "Not heating at expected rate" protection: Fans switched to slow.
            {% endif %}
			BEDFANSSLOW
            UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=5
        {% else %}
            # MAINTAIN CHAMBER TEMP
            # Only ramp down if we exceed target (with buffer)
            {% if current_chamber > (target_chamber + 0.2) %}
                # Target met: Bleed off speed
                POWER_BLEED
                UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=30 # <--- Damping: Wait longer for air to settle
            {% elif current_chamber < (target_chamber - 0.2) %}
                # Only ramp up if we drop below target (The Deadzone)
                POWER_RAMP 
                UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=15 # <--- Faster response when climbing
            {% else %}
                # Within the "Sweet Spot" - Do nothing, just maintain current speed
                UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=15
            {% endif %}
        {% endif %}
    {% else %}
        # STOP LOOP & CLEANUP
        BEDFANSOFF
        M118 Bed target below threshold. Fans deactivated.
        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    {% endif %}

[delayed_gcode bedfancoolloop]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set bed_temp = printer.heater_bed.temperature|float %}
    {% set sensor = vars.chamber_sensor %}
    {% set chamber_temp = printer["temperature_sensor " + sensor].temperature|float %}

    {% if bed_temp >= vars.cooling_threshold %}
        {% if bed_temp > (chamber_temp + vars.cooling_delta) %}
            BEDFANSFAST
            UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=5
        {% elif bed_temp > chamber_temp %}
            BEDFANSSLOW
            UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=5
        {% else %}
            BEDFANSOFF
            UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
        {% endif %}
    {% else %}
        BEDFANSOFF
        UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
    {% endif %}

#####################################################################
# FUNCTIONAL TESTING
#####################################################################
[gcode_macro TEST_FAN_RAMP]
gcode:
    # 1. Pull the target from variables block above
    {% set target = printer["gcode_macro _BEDFANVARS"].chamber_target_test %}

    # 2. Cancel any existing loop to prevent "double-timing"
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    
    # 3. Start a fresh loop immediately
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=1
    
    # 4. Feedback to console
    M118 Testing Ramp: Target {target}C. Initializing loop...

[gcode_macro TEST_FAN_COOLDOWN]
gcode:
    # 1. Stop the heat-management logic
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    
    # 2. Kill all heaters (Safe State)
    M118 [Testing Cooldown]
    M118 Killing all heaters...
    TURN_OFF_HEATERS
    
    # 3. Start the cooling logic
    M118 Starting Cooldown Loop...
    UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=1