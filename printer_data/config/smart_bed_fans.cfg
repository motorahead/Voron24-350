#####################################################################
# Smart Bed Fan Control System
#####################################################################
#  DISCLAIMER
#  Script inspired by Ellis bedfans.cfg and 3DPrintDemon's bed fan monitor.
#    - https://github.com/VoronDesign/VoronUsers/tree/8e5067f4f6457da8a552983dd210ec48c40be2ca/printer_mods/Ellis/Bed_Fans/Klipper_Macros
#    - https://github.com/3DPrintDemon/Demon_Klipper_Essentials_Unified
#    - Development supported by Kiro/Claude in addition to functional testing and code verification.
#
#  FEATURES
#  Design philosophy prioritizes a turn-key, autonomous chamber temperature management tool.
#  
#  High Level Features
#    - Proportional 5% step ramping with deadband
#    - Bed protection — throttles/kills fans if bed loses temp (prevents "not heating at expected rate")
#    - 30s stable confirmation before proceeding
#    - Adaptive timing — faster checks when recovering, slower when stable
#    - Cooldown management with delta-based fan speed
#    - LED integration hooks
#    - All parameters tunable from one block
#
#  Heat-Up Efficiency and "Not Heating at Expected Rate" Protection
#    - Fans stay OFF during M190 to prioritize bed heating.
#    - Fans throttle to slow if bed drops >2C, off if >4C below target.
#
#  Proportional Chamber Temperature Management
#    - Fans ramp up in 5% steps until chamber target is reached.
#    - 30s stable confirmation required before proceeding to print.
#    - Adaptive loop timing: faster checks when recovering, slower when stable (damping).
#    - Deadband threshold prevents unnecessary fan adjustments in the sweet spot.
#
#  Dynamic Print-Time Maintenance
#    - Bed fan loop continues during print, maintaining chamber temperature autonomously.
#    - Bed protection logic remains active throughout - throttles fans if bed loses temp.
#
#  Preventative Print Warping via Chamber Cooldown Management
#    - Full speed fans until bed/chamber delta closes to defined threshold.
#    - Slows fans as temperatures converge - safer for ABS warping prevention.
#    - Auto-shutdown once bed reaches defined cooling threshold.
#
#  PLA / Low-Temp Safety
#    - Fans stay off entirely when bed target is below heating threshold.
#
#  All parameters tunable from a single [_BEDFANVARS] configuration block.
#  Compatible with any printer size or fan count - tune the variables to match your setup.
#
#  ARCHITECTURE NOTE
#  All complex logic lives in _BED_FAN_MANAGE (a regular gcode macro).
#  The [delayed_gcode] blocks are intentionally minimal (1 call each) to avoid
#  Klipper silent-failure issues with complex Jinja in delayed_gcode bodies.
#  Heatsoak fan control is driven from CHAMBER_HEATSOAK, called by PRINT_START.
#
#####################################################################
#  SETUP INSTRUCTIONS
#####################################################################
#
#  1. CONFIGURATION
#     Edit [_BEDFANVARS] to match your printer:
#       - variable_fan:                    must match your [fan_generic] name
#       - variable_chamber_sensor:         must match your [temperature_sensor] name
#       - variable_heating_threshold:      set to your ABS/ASA bed temp (default 90)
#       - variable_chamber_target_default: set to your typical ABS/ASA chamber target
#
#  2. SLICER
#     Ensure your slicer passes BED, EXTRUDER, and CHAMBER targets into PRINT_START.
#     Most Voron slicer profiles already do this. If CHAMBER is omitted or 0,
#     chamber_target_default is used as fallback.
#
#  3. PRINT_START integration:
#
#     a) At the very top of your PRINT_START gcode, add the reset block:
#
#           SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE=0
#           SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE=0
#
#     b) Replace your existing M190 call and bed soak logic entirely with this block
#        (it includes M190 internally):
#
#           {% if target_bed >= 90 %}
#               # High-temp path: ABS/ASA - heatsoak with autonomous fan management
#               SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE={target_chamber}
#               M190 S{target_bed}                    # fans stay OFF during heat-up
#               {% if target_chamber > 0 %}
#                   CHAMBER_HEATSOAK                  # ramp fans, wait 30s stable, restores chamber_target
#               {% endif %}
#               UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=15  # hands off to print-time maintenance
#           {% else %}
#               # Low-temp path: PLA/PETG - no fans, fixed soak
#               M190 S{target_bed}
#               G4 P300000                            # 5 min soak
#           {% endif %}
#
#  4. PRINT_END
#     Add TURN_OFF_HEATERS and a conditional display message:
#
#           TURN_OFF_HEATERS
#           {% if printer["gcode_macro _BEDFANVARS"].chamber_target|float != 0 %}
#               SET_DISPLAY_TEXT MSG="Print Complete - Cooling"
#           {% else %}
#               SET_DISPLAY_TEXT MSG="Print Complete"
#           {% endif %}
#
#  5. LED EFFECTS (optional)
#     If using led effects e.g. stealthburner_led_effects.cfg, Call your custom LED status macros in the variables below. Set to "off" to disable.
#
#####################################################################

#####################################################################
# CONFIGURATION VARIABLES
#####################################################################
[gcode_macro _BEDFANVARS]
variable_fan:                    "Bed_Fans"     # fan_generic name in printer.cfg
variable_chamber_sensor:         "Chamber_Temp" # temperature_sensor name in printer.cfg
variable_heating_threshold:      90             # min bed target to enable fans (skips PLA)
variable_slow:                   0.25           # min fan speed (25% - above off_below: 0.19)
variable_fast:                   1.0            # max fan speed
variable_cooling_threshold:      40             # bed temp at which cooldown loop stops
variable_cooling_delta:          10             # bed/chamber gap to switch from fast to slow during cooldown
variable_ramp_increment:         0.05           # fan speed step per call (5%)
variable_chamber_target_default: 63             # Default if slicer sends CHAMBER=0 and bed > 90c
variable_heatsoak_start_delay:   60             # seconds to wait after bed reaches target before starting fans

# LED effects -  Set to a macro name or "off" to disable.
variable_chamber_heating_effect:    "status_chamber_heating" # LED effect during chamber heatsoak.
variable_chamber_cooldown_effect:   "status_cooling"         # LED effect during cooldown.
variable_cooldown_complete_effect:  "status_part_ready"      # LED effect when cooldown finishes.

# Advanced tuning - Values below are tuned for 2.4 350mm with four bed fans.
variable_interval_ramp:          15             # seconds between checks when chamber is climbing
variable_interval_hold:          15             # seconds between checks in sweet spot
variable_interval_bleed:         30             # seconds between checks when bleeding (damping) fan speed
variable_interval_bed_warn:      5              # seconds between checks when bed is recovering from heat loss
variable_chamber_deadband:       0.5            # degrees C either side of chamber target = sweet spot
variable_bed_throttle_slow:      1.0            # degrees C below bed target to slow fans
variable_bed_throttle_off:       3.0            # degrees C below bed target to kill fans

# Debug/Console verbosity. 0 = silent (milestones only), 1 = normal status, 2 = full debug
variable_debug:                  1

# Internal state - DO NOT MODIFY
variable_chamber_target:         0              # active chamber target; -1 = heatsoak confirmed (internal signal)
variable_chamber_confirm_count:  0

gcode:

#####################################################################
# BASIC FAN COMMANDS
#####################################################################
[gcode_macro BEDFANSOFF]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED=0

[gcode_macro BEDFANSSLOW]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED={printer["gcode_macro _BEDFANVARS"].slow}

[gcode_macro BEDFANSFAST]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED={printer["gcode_macro _BEDFANVARS"].fast}

#####################################################################
# CORE FAN MANAGEMENT
# All logic lives here. Called by delayed_gcode blocks and CHAMBER_HEATSOAK.
# MODE: HEATSOAK (default) or COOLDOWN
#####################################################################
[gcode_macro _BED_FAN_MANAGE]
gcode:
    {% set mode = params.MODE|default("HEATSOAK") %}
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    # Skip if chamber already confirmed stable during heatsoak (chamber_target == -1 is the signal)
    {% if vars.chamber_target|float == -1 and mode == "HEATSOAK" %}
        G4 P1  # 1ms no-op - Klipper requires at least one command per branch
    {% else %}
        {% set fan = vars.fan %}
        {% set slow = vars.slow|float %}
        {% set fast = vars.fast|float %}
        {% set current_speed = printer["fan_generic " ~ fan].speed|float %}
        {% set bed_temp = printer.heater_bed.temperature|float %}
        {% set bed_target = printer.heater_bed.target|float %}
        {% set chamber = printer["temperature_sensor " ~ vars.chamber_sensor].temperature|float %}
        {% set chamber_target = vars.chamber_target|float if vars.chamber_target|float > 0 else vars.chamber_target_default|float %}

        {% if mode == "COOLDOWN" %}
            {% if bed_temp >= vars.cooling_threshold %}
                {% if bed_temp > (chamber + vars.cooling_delta) %}
                    BEDFANSFAST
                {% elif bed_temp > chamber %}
                    BEDFANSSLOW
                {% else %}
                    BEDFANSOFF
                    UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
                {% endif %}
                {% if vars.debug >= 2 %}
                    M118 Cooldown: bed={bed_temp|round(1)}C chamber={chamber|round(1)}C fans={(printer["fan_generic " ~ fan].speed * 100)|int}%
                {% endif %}
                UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=5
            {% else %}
                BEDFANSOFF
                UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
                M118 Bed fans off: cooldown complete
                {% if vars.cooldown_complete_effect != "off" %}
                    { vars.cooldown_complete_effect }
                {% endif %}
            {% endif %}

        {% else %}
            # HEATSOAK mode: maintain chamber temp, protect bed from heat loss
            {% if bed_target >= vars.heating_threshold %}
                {% if bed_temp < (bed_target - vars.bed_throttle_off) %}
                    BEDFANSOFF
                    {% if vars.debug >= 1 %}
                        M118 Bed fans off: bed temp low ({bed_temp|round(1)}C / {bed_target|round(1)}C)
                    {% endif %}
                    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bed_warn}
                {% elif bed_temp < (bed_target - vars.bed_throttle_slow) %}
                    BEDFANSSLOW
                    {% if vars.debug >= 1 %}
                        M118 Bed fans slow: bed recovering ({bed_temp|round(1)}C / {bed_target|round(1)}C)
                    {% endif %}
                    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bed_warn}
                {% else %}
                    {% if chamber < (chamber_target - vars.chamber_deadband) %}
                        {% if current_speed < slow %}
                            SET_FAN_SPEED FAN={fan} SPEED={slow}
                        {% elif current_speed < fast %}
                            SET_FAN_SPEED FAN={fan} SPEED={[current_speed + vars.ramp_increment, fast]|min}
                        {% endif %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_ramp}
                    {% elif chamber > (chamber_target + vars.chamber_deadband) %}
                        {% if current_speed > slow %}
                            SET_FAN_SPEED FAN={fan} SPEED={[current_speed - vars.ramp_increment, slow]|max}
                        {% endif %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bleed}
                    {% else %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_hold}
                    {% endif %}
                {% endif %}
            {% else %}
                BEDFANSOFF
                UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
                {% if vars.debug >= 1 %}
                    M118 Bed fans off: bed target below threshold
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}

#####################################################################
# MINIMAL DELAYED_GCODE BLOCKS
# 1 line each - all logic is in _BED_FAN_MANAGE to avoid parse failures
#####################################################################
[delayed_gcode bedfanheatloop]
gcode:
    _BED_FAN_MANAGE MODE=HEATSOAK

[delayed_gcode bedfancoolloop]
gcode:
    _BED_FAN_MANAGE MODE=COOLDOWN

#####################################################################
# CHAMBER HEATSOAK
# Called from PRINT_START after bed reaches target.
# Ramps fans, monitors chamber, waits for 30s stable confirmation.
# Loop drains at 100ms per tick once stable to exit quickly.
#####################################################################
[gcode_macro CHAMBER_HEATSOAK]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set target = vars.chamber_target|float if vars.chamber_target|float > 0 else vars.chamber_target_default|float %}
    M118 [PRINT_START] Bed ready. Starting chamber heatsoak to {target}C
    SET_DISPLAY_TEXT MSG="Chamber Heatsoak: {target}c"
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_heating_effect != "off" %}
        { vars.chamber_heating_effect }
    {% endif %}
    M118 Bed stabilizing before fans start ({vars.heatsoak_start_delay}s)
    G4 P{ vars.heatsoak_start_delay * 1000 }
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE=0
    {% for i in range(120) %}
        _BED_FAN_MANAGE MODE=HEATSOAK
        _CHAMBER_READY
        _DRAIN_LOOP_WAIT
    {% endfor %}
    # Report result before restoring chamber_target
    _CHAMBER_HEATSOAK_RESULT
    # Restore chamber_target back to actual target for print-time loop
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE={target}
    SET_DISPLAY_TEXT MSG="Chamber Ready"

# Checks chamber temp each iteration. Requires 2 consecutive passes (30s) to confirm stable.
# Sets chamber_target=-1 as the proceed signal. Resets counter if temp drops below target.
[gcode_macro _CHAMBER_READY]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_target|float == -1 %}
        G4 P1
    {% else %}
        {% set chamber = printer["temperature_sensor " ~ vars.chamber_sensor].temperature|float %}
        {% set target = vars.chamber_target|float if vars.chamber_target|float > 0 else vars.chamber_target_default|float %}
        {% if chamber >= target %}
            {% set count = vars.chamber_confirm_count|int + 1 %}
            SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE={count}
            {% if vars.debug >= 1 %}
                M118 Chamber at target: {chamber|round(1)}C / {target}C fans={(printer["fan_generic " ~ vars.fan].speed * 100)|int}% (confirm {count}/2)
            {% endif %}
            {% if count >= 2 %}
                M118 Chamber stable for 30s - proceeding
                SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE=-1
            {% endif %}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE=0
            {% if vars.debug >= 2 %}
                M118 Chamber Heatsoak: {chamber|round(1)}C / {target}C fans={(printer["fan_generic " ~ vars.fan].speed * 100)|int}%
            {% endif %}
        {% endif %}
    {% endif %}

# Reports heatsoak outcome - called after loop, before chamber_target is restored
[gcode_macro _CHAMBER_HEATSOAK_RESULT]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_target|float == -1 %}
        M118 Chamber heatsoak complete
    {% else %}
        M118 Chamber heatsoak timed out after 30 min - proceeding anyway
        SET_DISPLAY_TEXT MSG="Chamber Timeout"
    {% endif %}

# Short dwell: 15s during heatsoak, 100ms once chamber confirmed to drain loop fast
[gcode_macro _DRAIN_LOOP_WAIT]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_target|float == -1 %}
        G4 P100
    {% else %}
        G4 P15000
    {% endif %}

#####################################################################
# HEATER OVERRIDES
#####################################################################
[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set heater = params.HEATER|default("None") %}
    {% set target = params.TARGET|default(0.0)|float %}
    {% if heater|lower == "heater_bed" %}
        _SET_HEATER_TEMPERATURE HEATER={heater} TARGET={target}
    {% else %}
        _SET_HEATER_TEMPERATURE {rawparams}
    {% endif %}

[gcode_macro M140]
rename_existing: M99140
gcode:
    {% set s = params.S|float %}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={s}

# Fans stay OFF during bed heat-up. PRINT_START drives fan logic via CHAMBER_HEATSOAK after M190 returns.
[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|float %}
    BEDFANSOFF
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    M99190 S{s}

#####################################################################
# TURN_OFF_HEATERS OVERRIDE
# Stops heat loop and starts cooldown on print end / heaters off
#####################################################################
[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    _TURN_OFF_HEATERS
    # Force-exit CHAMBER_HEATSOAK loop if running, then start cooldown
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE=-1
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=1
    M118 Bed fans: starting cooldown loop
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_cooldown_effect != "off" %}
        { vars.chamber_cooldown_effect }
    {% endif %}

#####################################################################
# FUNCTIONAL TESTING
#####################################################################
[gcode_macro TEST_BED_FANS]
gcode:
    # Sets chamber_target=0 so the loop uses chamber_target_default as the target
    M118 [TEST] Starting fan management loop
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE=0
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=1

[gcode_macro TEST_FAN_COOLDOWN]
gcode:
    # Note: TURN_OFF_HEATERS sets chamber_target=-1. PRINT_START resets it on next print.
    M118 [TEST] Starting cooldown loop
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    TURN_OFF_HEATERS
