#####################################################################
# Functional Test Suite for PRINT_START
#####################################################################

[gcode_macro TEST_ABS_PROMPT]
description: Test high-temp logic with missing slicer chamber target
gcode:
    M118 Starting Functional Test: ABS with Prompt
    # Simulates ABS: Bed >= 90C, Chamber target missing (0)
    PRINT_START BED=105 EXTRUDER=150 CHAMBER=0

[gcode_macro TEST_ABS_SLICER_TARGET]
description: Test high-temp logic with explicit slicer chamber target
gcode:
    M118 Starting Functional Test: ABS with 45C Slicer Target
    # Simulates ABS: Bed >= 90C, Chamber target provided
    PRINT_START BED=105 EXTRUDER=150 CHAMBER=45

[gcode_macro TEST_PLA_FLOW]
description: Test low-temp material path (No prompt, 5min soak)
gcode:
    M118 Starting Functional Test: PLA Standard Flow
    # Simulates PLA: Bed < 90C
    PRINT_START BED=60 EXTRUDER=150 CHAMBER=0