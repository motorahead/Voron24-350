#####################################################################
# Smart Bed Fan Control System
#####################################################################
#
# Full documentation: README.md (https://github.com/motorahead/Voron-SmartChamber)
# License: GPL v3  -  https://github.com/motorahead/Voron-SmartChamber/blob/main/LICENSE
# Development supported by Kiro/Claude.
#
#####################################################################
# CONFIGURATION VARIABLES
#####################################################################
[gcode_macro _BEDFANVARS]
variable_fan:                    "Bed_Fans"     # fan_generic name in printer.cfg
variable_chamber_sensor:         "Chamber_Temp" # temperature_sensor name in printer.cfg
variable_heating_threshold:      90             # min bed target to enable fans

variable_slow:                   0.25           # min fan speed  -  must be above your fan's off_below value in printer.cfg
variable_fast:                   1.0            # max fan speed
variable_ramp_increment:         0.05           # fan speed step per call (5%)

variable_cooling_threshold:      40             # bed temp at which cooldown loop stops
variable_cooling_delta:          10             # bed/chamber gap to switch from fast to slow during cooldown

variable_heatsoak_start_delay:   60             # seconds to wait after bed reaches target before starting fans
variable_chamber_target_default: 63             # fallback chamber target if slicer sends CHAMBER=0 - set to your typical ABS/ASA target
variable_chamber_min_start:      60             # minimum chamber temp to allow print after heatsoak timeout. Must be <= chamber_target_default (0 = disabled)

# LED effects -  Set to your existing macro name or "off" to disable.
variable_chamber_heating_effect:    "status_chamber_heating" # LED effect during chamber heatsoak.
variable_chamber_cooldown_effect:   "status_cooling"         # LED effect during cooldown.
variable_cooldown_complete_effect:  "status_part_ready"      # LED effect when cooldown finishes.

# Advanced tuning - Values below are tuned for 2.4 350mm with four bed fans.
variable_chamber_reached_delay:  4              # consecutive stable passes required before heatsoak completes (4 x 15s = 60s at stable rate)
variable_rate_threshold:         0.5            # degrees change C +/- per min - when temp change is under .5c per min AND chamber temp >= chamber_state, chamber_reached_delay counts stability passes
variable_interval_ramp:          15             # seconds between checks when chamber is climbing
variable_interval_hold:          15             # seconds between checks in sweet spot
variable_interval_bleed:         30             # seconds between checks when bleeding (damping) fan speed
variable_interval_bed_warn:      5              # seconds between checks when bed is recovering from heat loss
variable_chamber_deadband:       0.5            # degrees C either side of chamber target = sweet spot
variable_bed_throttle_slow:      1.0            # degrees C below bed target to slow fans
variable_bed_throttle_off:       3.0            # degrees C below bed target to kill fans

# Debug/Console verbosity. 0 = Chamber/Fan milestones, 1 = Chamber/Fan state changes, 2 = Chamber/Fan full per-tick output
variable_debug:                  0

# Internal state - DO NOT MODIFY
variable_chamber_state:          0              # active chamber target; -1 = heatsoak confirmed (internal signal)
variable_chamber_confirm_count:  0
variable_last_chamber_temp:      0              # previous chamber temp reading for rate-of-change calculation

gcode:

#####################################################################
# BASIC FAN COMMANDS
#####################################################################
[gcode_macro BEDFANSOFF]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED=0

[gcode_macro BEDFANSSLOW]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED={printer["gcode_macro _BEDFANVARS"].slow}

[gcode_macro BEDFANSFAST]
gcode:
    SET_FAN_SPEED FAN={printer["gcode_macro _BEDFANVARS"].fan} SPEED={printer["gcode_macro _BEDFANVARS"].fast}

#####################################################################
# FAN MANAGEMENT
# All fan logic lives here. Called by delayed_gcode blocks and CHAMBER_HEATSOAK.
#####################################################################
[gcode_macro _BED_FAN_MANAGE]
gcode:
    {% set mode = params.MODE %}
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    # Run fan logic when heatsoak is still active (chamber_state != -1), OR always in COOLDOWN mode
    {% if vars.chamber_state|float != -1 or mode == "FAN_COOLDOWN" %}
        {% set fan = vars.fan %}
        {% set slow = vars.slow|float %}
        {% set fast = vars.fast|float %}
        {% set current_speed = printer["fan_generic " ~ fan].speed|float %}
        {% set bed_temp = printer.heater_bed.temperature|float %}
        {% set bed_target = printer.heater_bed.target|float %}
        {% set chamber = printer["temperature_sensor " ~ vars.chamber_sensor].temperature|float %}
        {% set chamber_state = vars.chamber_state|float if vars.chamber_state|float > 0 else vars.chamber_target_default|float %}

        {% if mode == "FAN_HEATSOAK" %}
            # HEATSOAK mode: ramp fans toward chamber target, protect bed from heat loss
            {% if bed_target >= vars.heating_threshold %}
                {% if bed_temp < (bed_target - vars.bed_throttle_off) %}
                    BEDFANSOFF
                    {% if vars.debug >= 1 %}
                        M118 Bed fans off: bed temp low ({bed_temp|round(1)}C / {bed_target|round(1)}C)
                    {% endif %}
                    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bed_warn}
                {% elif bed_temp < (bed_target - vars.bed_throttle_slow) %}
                    BEDFANSSLOW
                    {% if vars.debug >= 1 %}
                        M118 Bed fans slow: bed recovering ({bed_temp|round(1)}C / {bed_target|round(1)}C)
                    {% endif %}
                    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bed_warn}
                {% else %}
                    {% if chamber < (chamber_state - vars.chamber_deadband) %}
                        {% if current_speed < slow %}
                            SET_FAN_SPEED FAN={fan} SPEED={slow}
                        {% elif current_speed < fast %}
                            SET_FAN_SPEED FAN={fan} SPEED={[current_speed + vars.ramp_increment, fast]|min}
                        {% endif %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_ramp}
                    {% elif chamber > (chamber_state + vars.chamber_deadband) %}
                        {% if current_speed > slow %}
                            SET_FAN_SPEED FAN={fan} SPEED={[current_speed - vars.ramp_increment, slow]|max}
                        {% endif %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_bleed}
                    {% else %}
                        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION={vars.interval_hold}
                    {% endif %}
                {% endif %}
            {% else %}
                # bed_target not greater than vars.heating_threshold. Skip Heatsoak and disable bed fans.
                BEDFANSOFF
                UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
                {% if vars.debug >= 1 %}
                    M118 Bed fans off: bed target below threshold
                {% endif %}
            {% endif %}

        {% elif mode == "FAN_COOLDOWN" %}
            {% if bed_temp >= vars.cooling_threshold %}
                {% if bed_temp > (chamber + vars.cooling_delta) %}
                    BEDFANSFAST
                {% elif bed_temp > chamber %}
                    BEDFANSSLOW
                {% else %}
                    BEDFANSOFF
                    UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
                {% endif %}
                {% if vars.debug >= 2 %}
                    M118 Cooldown: bed={bed_temp|round(1)}C chamber={chamber|round(1)}C fans={(printer["fan_generic " ~ fan].speed * 100)|int}%
                {% endif %}
                UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=5
            {% else %}
                BEDFANSOFF
                UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=0
                M118 Bed fans off: cooldown complete
                {% if vars.cooldown_complete_effect != "off" %}
                    { vars.cooldown_complete_effect }
                {% endif %}
            {% endif %}

        {% else %}
            M118 _BED_FAN_MANAGE: unknown MODE={mode} - must be FAN_HEATSOAK or FAN_COOLDOWN
        {% endif %}
    {% endif %}

#####################################################################
# BACKGROUND LOOP TRIGGERS
# Self rescheduling timers that keep fan management running
# autonomously during prints and cooldown.
#####################################################################
[delayed_gcode bedfanheatloop]
gcode:
    _BED_FAN_MANAGE MODE=FAN_HEATSOAK

[delayed_gcode bedfancoolloop]
gcode:
    _BED_FAN_MANAGE MODE=FAN_COOLDOWN

#####################################################################
# _DRAIN_LOOP_WAIT
# Per-iteration dwell inside CHAMBER_HEATSOAK loop.
# 15s during warmup, switches to 100ms once chamber is confirmed stable
# so remaining loop iterations drain quickly.
#####################################################################
[gcode_macro _DRAIN_LOOP_WAIT]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_state|float == -1 %}
        G4 P100 #100ms
    {% else %}
        G4 P15000 #15sec
    {% endif %}

#####################################################################
# _CHAMBER_STABILITY_CHECK
# Called each loop iteration. Checks chamber stability using rate-of-change.
# Inspired by garethky's interruptible heatsoak:
#   https://github.com/garethky/klipper-voron2.4-config
# Only runs when chamber_state > 0 (active heatsoak in progress).
# Completion requires:
#   1. Chamber rate of change < rate_threshold (degrees C/min)
#   2. Chamber >= chamber_state
#   3. Both conditions met for chamber_reached_delay consecutive passes
# Sets chamber_state = -1 as the confirmed-stable signal.
#####################################################################
[gcode_macro _CHAMBER_STABILITY_CHECK]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_state|float > 0 %}
        {% set chamber = printer["temperature_sensor " ~ vars.chamber_sensor].temperature|float %}
        {% set target = vars.chamber_state|float if vars.chamber_state|float > 0 else vars.chamber_target_default|float %}
        {% set last_temp = vars.last_chamber_temp|float %}
        # Rate of change in degrees C per minute (interval is 15s = 0.25 min)
        {% set rate = ((chamber - last_temp) / 0.25)|abs %}
        # Store current temp for next iteration
        SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=last_chamber_temp VALUE={chamber}
        {% if last_temp > 0 and rate < vars.rate_threshold|float and chamber >= target %}
            {% set count = vars.chamber_confirm_count|int + 1 %}
            SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE={count}
            {% if vars.debug >= 1 %}
                M118 Chamber stable: {chamber|round(1)}C / {target}C rate={rate|round(2)}C/min (confirm {count}/{vars.chamber_reached_delay})
            {% endif %}
            {% if count >= vars.chamber_reached_delay %}
                M118 Chamber heatsoak complete - stable at {chamber|round(1)}C
                SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_state VALUE=-1
            {% endif %}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE=0
            {% if vars.debug >= 2 %}
                M118 Chamber Heatsoak: {chamber|round(1)}C / {target}C rate={rate|round(2)}C/min fans={(printer["fan_generic " ~ vars.fan].speed * 100)|int}%
            {% endif %}
        {% endif %}
    {% endif %}

#####################################################################
# _HEATSOAK_TIMEOUT_HANDLER
# Called after the heatsoak loop completes, before chamber_state is restored.
# Only runs when chamber_state > 0 (heatsoak timed out without confirming stable).
# If chamber_min_start is set, cancels print if chamber is below the minimum.
#####################################################################
[gcode_macro _HEATSOAK_TIMEOUT_HANDLER]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_state|float > 0 %}
        {% set chamber = printer["temperature_sensor " ~ vars.chamber_sensor].temperature|float %}
        {% if vars.chamber_min_start|float > 0 and chamber < vars.chamber_min_start|float %}
            M118 Chamber heatsoak timed out  -  {chamber|round(1)}C is below minimum {vars.chamber_min_start}C  -  cancelling print
            SET_DISPLAY_TEXT MSG="Chamber too cold - cancelled"
            CANCEL_PRINT
        {% else %}
            M118 Chamber heatsoak timed out  -  {chamber|round(1)}C  -  proceeding anyway
            SET_DISPLAY_TEXT MSG="Chamber Timeout"
        {% endif %}
    {% endif %}

#####################################################################
# CHAMBER HEATSOAK
# Called from PRINT_START after bed reaches target.
# Ramps fans, monitors chamber stability, waits for confirmation.
# Loop runs up to 120 iterations (30 min max), drains at 100ms once stable.
#####################################################################
[gcode_macro CHAMBER_HEATSOAK]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% set target = vars.chamber_state|float if vars.chamber_state|float > 0 else vars.chamber_target_default|float %}
    # Validate: chamber_min_start must be <= target to avoid impossible timeout condition
    {% if vars.chamber_min_start|float > 0 and vars.chamber_min_start|float > target %}
        M118 WARNING: chamber_min_start ({vars.chamber_min_start}C) is higher than chamber target ({target}C) - print will cancel on timeout
    {% endif %}
    M118 [PRINT_START] Bed ready. Starting chamber heatsoak to {target}C
    SET_DISPLAY_TEXT MSG="Chamber Heatsoak: {target}c"
    {% if vars.chamber_heating_effect != "off" %}
        { vars.chamber_heating_effect }
    {% endif %}
    M118 Bed stabilizing for {vars.heatsoak_start_delay}s before fan management begins
    G4 P{ vars.heatsoak_start_delay * 1000 }
    M118 Fan management active - monitoring chamber.
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_confirm_count VALUE=0
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=last_chamber_temp VALUE=0
    {% for i in range(120) %}
        _BED_FAN_MANAGE MODE=FAN_HEATSOAK
        _CHAMBER_STABILITY_CHECK
        _DRAIN_LOOP_WAIT
    {% endfor %}
    # Handle timeout: check chamber_min_start, proceed or cancel
    _HEATSOAK_TIMEOUT_HANDLER
    # Restore chamber_state back to actual target for print-time loop
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_state VALUE={target}
    SET_DISPLAY_TEXT MSG="Chamber Ready"

#####################################################################
# HEATER OVERRIDES
# Fans stay OFF during bed heat-up. PRINT_START drives fan logic via CHAMBER_HEATSOAK after M190 returns.
#####################################################################
[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|float %}
    BEDFANSOFF
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    M99190 S{s}

#####################################################################
# TURN_OFF_HEATERS OVERRIDE
# Stops heat loop and starts cooldown on print end / heaters off
#####################################################################
[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    _TURN_OFF_HEATERS
    # Force-exit CHAMBER_HEATSOAK loop if running, then start cooldown
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_state VALUE=-1
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    UPDATE_DELAYED_GCODE ID=bedfancoolloop DURATION=1
    M118 Bed fans: starting cooldown loop
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if vars.chamber_cooldown_effect != "off" %}
        { vars.chamber_cooldown_effect }
    {% endif %}

#####################################################################
# FUNCTIONAL TESTING
#####################################################################
[gcode_macro TEST_BED_FANS]
gcode:
    # Sets chamber_state=0 so the loop uses chamber_target_default as the target
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    {% if printer.heater_bed.target < vars.heating_threshold %}
        M118 [TEST] Note: bed target must be >= {vars.heating_threshold|int}C for fans to activate. Set bed temp first.
    {% endif %}
    M118 [TEST] Starting fan management loop
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_state VALUE=0
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=1

[gcode_macro TEST_FAN_COOLDOWN]
gcode:
    # Note: TURN_OFF_HEATERS sets chamber_state=-1. PRINT_START resets it on next print.
    M118 [TEST] Starting cooldown loop
    UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=0
    TURN_OFF_HEATERS
