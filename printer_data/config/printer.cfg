## Voron Design VORON 2.4 350mm Leviathan V1.1, SB2209 CANBUS, CL V2 TAP
[include mainsail.cfg]
[include leviathansensorless.cfg]
[include stealthburner_led_effects.cfg]
[include smart_bed_fans.cfg]
[include test_speed.cfg]
[include shaketune.cfg]
[include config_backup.cfg]


# Leviathan Mainboard
[mcu]
canbus_uuid: 3f486bc43cdd

# SB2209 Toolhead Board
[mcu EBBCan]
canbus_uuid: 84c9eb37b809

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 10000
max_z_velocity: 15  #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[force_move]
enable_force_move: true


#####################################################################
#   X/Y Stepper Settings
#####################################################################
##  B Stepper - Left
##  Connected to HV STEPPER 0
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:400
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 50   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
diag0_pin: ^!PG1
interpolate: true
#driver_SGT: -1 #-64 is most sensitive value, 63 is least sensitive ---pre auto-tune
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0

[autotune_tmc stepper_x]
motor: ldo-42sth48-2004mah
sgt: 0 #-64 is most sensitive value, 63 is least sensitive

##  A Stepper - Right
##  Connected to HV STEPPER 1
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:400
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 50  #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
diag0_pin: ^!PE10
interpolate: true
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0

[autotune_tmc stepper_y]
motor: ldo-42sth48-2004mah
sgt: 0


#####################################################################
#   Z Stepper Settings
#####################################################################
## Z0 Stepper - Front Left
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 330
position_min: -10
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PD5
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac

## Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004ac

## Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PA8
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004ac

## Z3 Stepper - Front Right
[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PG8
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004ac


#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
rotation_distance: 47.38	    #G2E
gear_ratio: 9:1			        #G2E
microsteps: 16			        #G2E
full_steps_per_rotation: 200    #G2E
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan: PA3
min_temp: 10
max_temp: 300
max_power: 1.0
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: EBBCan: PA15
interpolate: false
run_current: 0.6		#G2E
stealthchop_threshold: 0


#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PG11
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA2
pullup_resistor: 2200
pwm_cycle_time: 0.02088 #47.9Hz
max_power: 1
min_temp: 0
max_temp: 120


#####################################################################
#   Probe
#####################################################################
[probe]
##  TAP Configuration
pin: !EBBCan: PB5
x_offset: 0
y_offset: 0
speed: 10.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3

activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

#####################################################################
#   Fan Control
#####################################################################
[fan]
##  Print Cooling Fan
pin: EBBCan: PA1
kick_start_time: 0.5
off_below: 0.10

[fan_generic Bed_Fans]
## Nevermore Filter / Bed Fans
pin: PF7
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.19

[heater_fan hotend_fan]
##  Hotend Fan
pin: EBBCan: PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0


#####################################################################
#   Filament Sensor (disabled)
#####################################################################
#[filament_switch_sensor Filament]
#pause_on_runout: True
#runout_gcode: M600
#insert_gcode:
#event_delay: 3.0
#pause_delay: 0.5
#switch_pin: !PC0

#####################################################################
#   LED Control
#####################################################################
[output_pin caselight]
pin: PE6
pwm: true
hardware_pwm: False
value: 0.20
shutdown_value: 0
cycle_time: 0.00025


#####################################################################
#   Accelerometer
#####################################################################
[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: z,-y,x

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20


#####################################################################
#   Input Shaper
#####################################################################
[input_shaper]
shaper_type_x: ei
shaper_freq_x: 64.0
damping_ratio_x: 0.047
shaper_type_y: ei
shaper_freq_y: 44.4
damping_ratio_y: 0.054


#####################################################################
#   Temperature Sensors
#####################################################################
[temperature_sensor Chamber_Temp]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: chamber_th

[temperature_sensor Toolhead_Board]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2
min_temp: 0
max_temp: 100
gcode_id: sb2209_th

[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor RaspberryPi]
sensor_type: temperature_host
min_temp: 0
max_temp: 85


#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################
[idle_timeout]
timeout: 1800

[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
points:
   50,25
   50,275
   300,275
   300,25
speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10


#####################################################################
#   Bed Mesh
#####################################################################
[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 310,310
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
adaptive_margin: 5
algorithm: bicubic


#####################################################################
#   Exclude Objects
#####################################################################
[exclude_object]


#####################################################################
#   Macros
#####################################################################

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    STATUS_HOMING
    G28
    QUAD_GANTRY_LEVEL
    G28
    G0 X175 Y175 Z50 F3000
    STATUS_READY
    RESTORE_GCODE_STATE NAME=STATE_G32

[gcode_macro C_QGL]
gcode:
    {% if printer.quad_gantry_level.applied == False %}
        G32
    {% endif %}

[gcode_macro BELT_TENSION]
gcode:
    C_QGL
    G0 X175 Y109 Z223

[gcode_macro PRINT_START]
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default(0)|int %}
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # Reset bed fan state
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE=0
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=last_extruder_target VALUE=0
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=last_x_wait VALUE=0
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=last_y_wait VALUE=0

    SET_GCODE_OFFSET Z=0
    BED_MESH_CLEAR

    STATUS_HOMING
    G28
    G90

    {% if target_bed >= 90 %}
        # High-temp path: ABS/ASA
        M118 [PRINT_START] High-temp path: bed={target_bed}, chamber={target_chamber}
        G1 X{x_wait} Y{y_wait} Z30 F3000
        STATUS_HEATING
        M106 S255
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"

        # Set chamber target before M190 so _BED_FAN_MANAGE can read it post-heatsoak
        SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_target VALUE={target_chamber}

        # M190: fans stay OFF during bed heat-up (override in smar_bed_fans_rev1.cfg)
        M190 S{target_bed}

        # Bed is now at target. Start fans and wait for chamber.
        {% if target_chamber > 0 %}
            M118 [PRINT_START] Bed ready. Starting chamber heatsoak to {target_chamber}C
            {% set ns = namespace(done=false) %}
            {% for i in range(120) %}
                {% if not ns.done %}
                    {% set current_chamber = printer["temperature_sensor Chamber_Temp"].temperature|float %}
                    {% if current_chamber >= target_chamber %}
                        {% set ns.done = true %}
                    {% else %}
                        # Fan management: protect bed, ramp fans toward chamber target
                        _BED_FAN_MANAGE MODE=HEATSOAK
                        SET_DISPLAY_TEXT MSG="Chamber: {current_chamber|round(1)}c / {target_chamber}c"
                        M118 Chamber Heatsoak: {current_chamber|round(1)} / {target_chamber} C
                        G4 P15000
                    {% endif %}
                {% endif %}
            {% endfor %}
            {% if ns.done %}
                SET_DISPLAY_TEXT MSG="Chamber Ready"
                M118 Chamber target reached!
            {% else %}
                SET_DISPLAY_TEXT MSG="Chamber Timeout"
                M118 Chamber heating timed out, proceeding anyway
            {% endif %}
        {% endif %}

        # Hand off to maintenance loop for rest of print
        UPDATE_DELAYED_GCODE ID=bedfanheatloop DURATION=15

    {% else %}
        # Standard path: PLA/PETG - no fans
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
        STATUS_HEATING
        G1 X{x_wait} Y{y_wait} Z50 F3000
        M190 S{target_bed}
        SET_DISPLAY_TEXT MSG="Soak for 5 min"
        G4 P300000
    {% endif %}

    # Pre-heat hotend and level
    M118 [PRINT_START] Proceeding to leveling
    G1 X{x_wait} Y{y_wait} Z50 F3000
    SET_DISPLAY_TEXT MSG="Hotend: 150c"
    M109 S150
    SET_DISPLAY_TEXT MSG="Leveling"
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    G28
    SET_DISPLAY_TEXT MSG="Bed mesh"
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1
    G1 X{x_wait} Y{y_wait} Z30 F3000

    # Final hotend temp
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    STATUS_HEATING
    M107
    M109 S{target_extruder}

    # Prime line
    SET_DISPLAY_TEXT MSG="Printer goes brr"
    STATUS_PRINTING
    G0 X{x_wait - 50} Y4 F10000
    G0 Z0.4
    G91
    G1 X110 E25 F1000
    G90

[gcode_macro PRINT_END]
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}

    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400
    G92 E0
    G1 E-15.0 F1800

    TURN_OFF_HEATERS

    G90
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
    M107

    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    SET_GCODE_OFFSET Z=0

